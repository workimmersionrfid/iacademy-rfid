<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - iACADEMY RFID</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: { 
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { brand: { blue: '#3674FF', blueHover: '#1349CC', bg: '#f4f5f7' } }
                }
            }
        }

        // SECURITY CHECK: Kick out anyone who isn't an admin
        document.addEventListener("DOMContentLoaded", () => {
            const token = localStorage.getItem('token');
            const role = localStorage.getItem('userRole');
            if (!token || role !== 'admin') {
                window.location.href = 'login.html';
            } else {
                // Fetch vehicles once we confirm they are logged in
                fetchVehicles();
            }
        });
    </script>
</head>
<body class="bg-brand-bg font-sans min-h-screen flex text-gray-800 antialiased">

    <aside class="w-64 bg-white border-r border-gray-200 hidden md:flex flex-col h-screen sticky top-0">
        <div class="h-16 flex items-center px-6 border-b border-gray-200">
            <div class="bg-brand-blue text-white w-8 h-8 rounded flex items-center justify-center font-bold mr-3">iA</div>
            <span class="font-bold text-lg tracking-tight">RFID Admin</span>
        </div>
        <div class="flex-1 overflow-y-auto py-4">
            <ul class="space-y-1 px-3">
                <li>
                    <a href="#" class="flex items-center px-3 py-2.5 bg-brand-blue/10 text-brand-blue rounded-lg font-medium text-sm">
                        <i class="fa-solid fa-car w-6 text-center"></i> Vehicle Fleet
                    </a>
                </li>
                <li>
                    <a href="insights.html" class="flex items-center px-3 py-2.5 text-gray-600 hover:bg-gray-50 rounded-lg font-medium text-sm transition-colors">
                        <i class="fa-solid fa-chart-pie w-6 text-center"></i> Analytics & Insights
                    </a>
                </li>
                <li>
                    <a href="travel-map.html" class="flex items-center px-3 py-2.5 text-gray-600 hover:bg-gray-50 rounded-lg font-medium text-sm transition-colors">
                        <i class="fa-solid fa-map-location-dot w-6 text-center"></i> Route Planner
                    </a>
                </li>
            </ul>
        </div>
        <div class="p-4 border-t border-gray-200">
            <div class="flex items-center gap-3 px-3 py-2">
                <div class="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center text-gray-500">
                    <i class="fa-solid fa-user-shield"></i>
                </div>
                <div class="flex-1 min-w-0">
                    <p class="text-sm font-bold text-gray-900 truncate">System Admin</p>
                    <p class="text-xs text-gray-500 truncate">Master Account</p>
                </div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-h-screen overflow-hidden">
        
        <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-6 sticky top-0 z-10">
            <h1 class="text-xl font-bold text-gray-800">Vehicle Management</h1>
            <button onclick="logout()" class="text-sm font-medium text-red-500 hover:text-red-700 transition-colors bg-red-50 hover:bg-red-100 px-4 py-2 rounded-lg">
                <i class="fa-solid fa-right-from-bracket mr-2"></i> Log Out
            </button>
        </header>

        <div class="flex-1 overflow-y-auto p-6 md:p-8">
            
            <div class="mb-8">
                <h2 class="text-2xl font-bold text-gray-800">Active Fleet</h2>
                <p class="text-sm text-gray-500 mt-1">Add, view, and remove vehicles from the school's database.</p>
            </div>

            <div class="grid grid-cols-1 xl:grid-cols-3 gap-8">
                
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 h-fit">
                    <h3 class="font-bold text-lg mb-4 flex items-center"><i class="fa-solid fa-circle-plus text-brand-blue mr-2"></i> Register New Vehicle</h3>
                    <form id="vehicleForm" class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase mb-1.5">Make & Model</label>
                            <input type="text" id="vModel" placeholder="e.g. Toyota Hiace" required class="w-full border border-gray-300 rounded-lg p-2.5 text-sm outline-none focus:border-brand-blue focus:ring-1 focus:ring-brand-blue transition-all">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase mb-1.5">Plate Number</label>
                            <input type="text" id="vPlate" placeholder="e.g. ABC 1234" required class="w-full border border-gray-300 rounded-lg p-2.5 text-sm outline-none focus:border-brand-blue focus:ring-1 focus:ring-brand-blue transition-all uppercase">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase mb-1.5">Year</label>
                                <input type="number" id="vYear" placeholder="2022" required class="w-full border border-gray-300 rounded-lg p-2.5 text-sm outline-none focus:border-brand-blue focus:ring-1 focus:ring-brand-blue transition-all">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase mb-1.5">Fuel Type</label>
                                <select id="vFuel" required class="w-full border border-gray-300 rounded-lg p-2.5 text-sm outline-none focus:border-brand-blue focus:ring-1 focus:ring-brand-blue transition-all bg-white">
                                    <option value="Diesel">Diesel</option>
                                    <option value="Gasoline">Gasoline</option>
                                </select>
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase mb-1.5">Fuel Efficiency (km/L)</label>
                            <input type="number" id="vEfficiency" step="0.1" placeholder="e.g. 12.5" required class="w-full border border-gray-300 rounded-lg p-2.5 text-sm outline-none focus:border-brand-blue focus:ring-1 focus:ring-brand-blue transition-all">
                        </div>
                        <button type="submit" class="w-full bg-brand-blue hover:bg-brand-blueHover text-white font-bold py-3 rounded-lg shadow-sm transition-colors mt-2">
                            Add to Fleet
                        </button>
                    </form>
                </div>

                <div class="xl:col-span-2 bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden flex flex-col h-fit">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse">
                            <thead>
                                <tr class="bg-gray-50 border-b border-gray-200 text-xs text-gray-500 uppercase tracking-wider">
                                    <th class="p-4 font-bold">Plate Number</th>
                                    <th class="p-4 font-bold">Make & Model</th>
                                    <th class="p-4 font-bold">Fuel Specs</th>
                                    <th class="p-4 font-bold text-right">Action</th>
                                </tr>
                            </thead>
                            <tbody id="vehicleList" class="text-sm divide-y divide-gray-100">
                                <tr>
                                    <td colspan="4" class="p-8 text-center text-gray-400">
                                        <i class="fa-solid fa-spinner fa-spin text-2xl mb-2"></i><br>Loading vehicles...
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script>
        // --- AUTH & NAVIGATION ---
        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        // --- DATABASE OPERATIONS ---
        async function fetchVehicles() {
            try {
                const res = await fetch('http://localhost:5000/api/vehicles');
                const vehicles = await res.json();
                
                const list = document.getElementById('vehicleList');
                list.innerHTML = ''; 

                if (vehicles.length === 0) {
                    list.innerHTML = `<tr><td colspan="4" class="p-12 text-center text-gray-400"><i class="fa-solid fa-car-side text-4xl mb-3 text-gray-300"></i><br>No vehicles registered yet.<br>Use the form to add your first vehicle.</td></tr>`;
                    return;
                }

                vehicles.forEach(v => {
                    const row = `
                        <tr class="hover:bg-gray-50 transition-colors">
                            <td class="p-4">
                                <span class="bg-blue-50 text-brand-blue font-bold px-3 py-1.5 rounded border border-blue-100 tracking-wider">${v.plateNumber}</span>
                            </td>
                            <td class="p-4 text-gray-800 font-medium">${v.year} ${v.model}</td>
                            <td class="p-4 text-gray-600">
                                <div class="flex items-center gap-2">
                                    <span class="bg-gray-100 text-gray-600 px-2 py-0.5 rounded text-xs font-semibold">${v.fuelType}</span>
                                    <span class="text-xs text-gray-500">${v.efficiency} km/L</span>
                                </div>
                            </td>
                            <td class="p-4 text-right">
                                <button onclick="deleteVehicle('${v._id}')" class="text-red-500 hover:text-red-700 bg-white border border-red-200 hover:bg-red-50 px-3 py-1.5 rounded-lg transition-colors text-xs font-bold shadow-sm">
                                    <i class="fa-solid fa-trash-can"></i> Delete
                                </button>
                            </td>
                        </tr>
                    `;
                    list.insertAdjacentHTML('beforeend', row);
                });
            } catch (err) {
                console.error("Error fetching vehicles:", err);
            }
        }

        document.getElementById('vehicleForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Saving...`;
            btn.disabled = true;

            const vehicleData = {
                model: document.getElementById('vModel').value,
                plateNumber: document.getElementById('vPlate').value.toUpperCase(),
                year: document.getElementById('vYear').value,
                fuelType: document.getElementById('vFuel').value,
                efficiency: parseFloat(document.getElementById('vEfficiency').value)
            };

            try {
                const res = await fetch('http://localhost:5000/api/vehicles', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(vehicleData)
                });

                if (res.ok) {
                    document.getElementById('vehicleForm').reset();
                    fetchVehicles(); 
                } else {
                    alert('Failed to add vehicle');
                }
            } catch (err) {
                console.error('Error saving vehicle:', err);
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });

        async function deleteVehicle(id) {
            if (confirm("Are you sure you want to permanently delete this vehicle?")) {
                try {
                    const res = await fetch(`http://localhost:5000/api/vehicles/${id}`, {
                        method: 'DELETE'
                    });
                    
                    if (res.ok) {
                        fetchVehicles(); 
                    }
                } catch (err) {
                    console.error("Error deleting vehicle:", err);
                }
            }
        }
    </script>
</body>
</html>
