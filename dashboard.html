<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - iACADEMY RFID</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: { 
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { brand: { blue: '#3674FF', blueHover: '#1349CC', bg: '#f4f5f7', border: '#e5e7eb' } }
                }
            }
        }

        // SECURITY CHECK
        document.addEventListener("DOMContentLoaded", () => {
            const token = localStorage.getItem('token');
            const role = localStorage.getItem('userRole');
            if (!token || role !== 'admin') {
                window.location.href = 'login.html';
            }
        });
    </script>
</head>
<body class="bg-brand-bg font-sans min-h-screen text-gray-800 antialiased">

    <div id="shared-nav"></div>

    <main class="max-w-[1400px] mx-auto px-6 py-8">
        
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-bold text-gray-800">System Overview</h1>
                <p class="text-sm text-gray-500 mt-1">Manage your active fleet and monitor driver fuel logs.</p>
            </div>
            <button onclick="logout()" class="text-sm font-medium text-red-500 hover:text-red-700 bg-red-50 hover:bg-red-100 px-4 py-2 rounded-lg transition-colors">
                <i class="fa-solid fa-right-from-bracket mr-2"></i> Log Out
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-xl border border-brand-border shadow-sm flex items-center gap-4">
                <div class="bg-blue-50 text-brand-blue w-12 h-12 rounded-full flex items-center justify-center text-xl"><i class="fa-solid fa-car"></i></div>
                <div>
                    <p class="text-xs font-bold text-gray-400 uppercase tracking-wider">Active Vehicles</p>
                    <h3 id="statVehicles" class="text-2xl font-black text-gray-800">0</h3>
                </div>
            </div>
            <div class="bg-white p-6 rounded-xl border border-brand-border shadow-sm flex items-center gap-4">
                <div class="bg-green-50 text-green-600 w-12 h-12 rounded-full flex items-center justify-center text-xl"><i class="fa-solid fa-file-invoice"></i></div>
                <div>
                    <p class="text-xs font-bold text-gray-400 uppercase tracking-wider">Total Logs</p>
                    <h3 id="statLogs" class="text-2xl font-black text-gray-800">0</h3>
                </div>
            </div>
            <div class="bg-white p-6 rounded-xl border border-brand-border shadow-sm flex items-center gap-4">
                <div class="bg-purple-50 text-purple-600 w-12 h-12 rounded-full flex items-center justify-center text-xl"><i class="fa-solid fa-peso-sign"></i></div>
                <div>
                    <p class="text-xs font-bold text-gray-400 uppercase tracking-wider">Total Fuel Spent</p>
                    <h3 id="statSpent" class="text-2xl font-black text-gray-800">₱0.00</h3>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 xl:grid-cols-3 gap-8">
            
            <div class="bg-white rounded-xl shadow-sm border border-brand-border p-6 h-fit">
                <h3 class="font-bold text-lg mb-4 flex items-center"><i class="fa-solid fa-circle-plus text-brand-blue mr-2"></i> Register New Vehicle</h3>
                <form id="vehicleForm" class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1.5">Make & Model</label>
                        <input type="text" id="vModel" placeholder="e.g. Toyota Hiace" required class="w-full border border-gray-300 rounded-lg p-2.5 text-sm outline-none focus:border-brand-blue">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1.5">Plate Number</label>
                        <input type="text" id="vPlate" placeholder="e.g. ABC 1234" required class="w-full border border-gray-300 rounded-lg p-2.5 text-sm outline-none focus:border-brand-blue uppercase">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase mb-1.5">Year</label>
                            <input type="number" id="vYear" placeholder="2022" required class="w-full border border-gray-300 rounded-lg p-2.5 text-sm outline-none focus:border-brand-blue">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase mb-1.5">Fuel Type</label>
                            <select id="vFuel" required class="w-full border border-gray-300 rounded-lg p-2.5 text-sm outline-none focus:border-brand-blue bg-white">
                                <option value="Diesel">Diesel</option>
                                <option value="Gasoline">Gasoline</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1.5">Fuel Efficiency (km/L)</label>
                        <input type="number" id="vEfficiency" step="0.1" placeholder="e.g. 12.5" required class="w-full border border-gray-300 rounded-lg p-2.5 text-sm outline-none focus:border-brand-blue">
                    </div>
                    <button type="submit" class="w-full bg-brand-blue hover:bg-brand-blueHover text-white font-bold py-3 rounded-lg shadow-sm transition-colors mt-2">
                        Add to Fleet
                    </button>
                </form>
            </div>

            <div class="xl:col-span-2 space-y-8">
                
                <div class="bg-white rounded-xl shadow-sm border border-brand-border overflow-hidden flex flex-col">
                    <div class="bg-gray-50 px-6 py-4 border-b border-gray-200">
                        <h2 class="font-bold text-sm text-gray-600 uppercase tracking-wider"><i class="fa-solid fa-car text-gray-400 mr-2"></i>Active Fleet</h2>
                    </div>
                    <div class="overflow-x-auto max-h-[300px] overflow-y-auto custom-scrollbar">
                        <table class="w-full text-left border-collapse">
                            <thead class="sticky top-0 bg-white z-10 shadow-sm">
                                <tr class="border-b border-gray-200 text-xs text-gray-400 uppercase tracking-wider">
                                    <th class="p-4 font-bold">Plate Number</th>
                                    <th class="p-4 font-bold">Make & Model</th>
                                    <th class="p-4 font-bold text-right">Action</th>
                                </tr>
                            </thead>
                            <tbody id="vehicleList" class="text-sm divide-y divide-gray-100">
                                <tr><td colspan="3" class="p-8 text-center text-gray-400"><i class="fa-solid fa-spinner fa-spin text-xl mb-2"></i><br>Loading fleet...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="bg-white rounded-xl shadow-sm border border-brand-border overflow-hidden flex flex-col">
                    <div class="bg-gray-50 px-6 py-4 border-b border-gray-200">
                        <h2 class="font-bold text-sm text-gray-600 uppercase tracking-wider"><i class="fa-solid fa-clock-rotate-left text-gray-400 mr-2"></i>Recent Fuel Logs</h2>
                    </div>
                    <div class="overflow-x-auto max-h-[400px] overflow-y-auto custom-scrollbar">
                        <table class="w-full text-left border-collapse">
                            <thead class="sticky top-0 bg-white z-10 shadow-sm">
                                <tr class="border-b border-gray-200 text-xs text-gray-400 uppercase tracking-wider">
                                    <th class="p-4 font-bold">Date</th>
                                    <th class="p-4 font-bold">Dept / Driver</th>
                                    <th class="p-4 font-bold">Vehicle</th>
                                    <th class="p-4 font-bold text-right">Total Cost</th>
                                </tr>
                            </thead>
                            <tbody id="logsList" class="text-sm divide-y divide-gray-100">
                                <tr><td colspan="4" class="p-8 text-center text-gray-400"><i class="fa-solid fa-spinner fa-spin text-xl mb-2"></i><br>Loading logs...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    
    <script>
        // Initialize Navigation from app.js
        document.addEventListener("DOMContentLoaded", () => {
            renderNavigation('dashboard');
            loadDashboardData();
        });

        function logout() {
            localStorage.clear();
            window.location.href = 'login.html';
        }

        // Load all data from MongoDB via data.js
        async function loadDashboardData() {
            const vehicles = await getVehicles();
            const logs = await getLogs();

            // Update Stats
            document.getElementById('statVehicles').innerText = vehicles.length;
            document.getElementById('statLogs').innerText = logs.length;
            
            const totalSpent = logs.reduce((sum, log) => sum + (log.total || 0), 0);
            document.getElementById('statSpent').innerText = `₱${totalSpent.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;

            // Render Vehicles
            const vList = document.getElementById('vehicleList');
            if (vehicles.length === 0) {
                vList.innerHTML = `<tr><td colspan="3" class="p-8 text-center text-gray-400">No vehicles registered yet.</td></tr>`;
            } else {
                vList.innerHTML = vehicles.map(v => `
                    <tr class="hover:bg-gray-50 transition-colors">
                        <td class="p-4"><span class="bg-blue-50 text-brand-blue font-bold px-3 py-1.5 rounded border border-blue-100 tracking-wider">${v.plateNumber}</span></td>
                        <td class="p-4 text-gray-800 font-medium">${v.year} ${v.model} <br><span class="text-xs text-gray-500 font-normal">${v.efficiency} km/L • ${v.fuelType}</span></td>
                        <td class="p-4 text-right">
                            <button onclick="deleteVehicle('${v._id}')" class="text-red-500 hover:text-red-700 bg-white border border-red-200 hover:bg-red-50 px-3 py-1.5 rounded-lg transition-colors text-xs font-bold shadow-sm"><i class="fa-solid fa-trash-can"></i> Delete</button>
                        </td>
                    </tr>
                `).join('');
            }

            // Render Logs
            const lList = document.getElementById('logsList');
            if (logs.length === 0) {
                lList.innerHTML = `<tr><td colspan="4" class="p-8 text-center text-gray-400">No fuel logs submitted yet.</td></tr>`;
            } else {
                lList.innerHTML = logs.map(l => `
                    <tr class="hover:bg-gray-50 transition-colors">
                        <td class="p-4 text-gray-500">${l.date}</td>
                        <td class="p-4">
                            <span class="font-bold text-gray-800">${l.department}</span><br>
                            <span class="text-xs text-gray-500"><i class="fa-regular fa-user mr-1"></i>${l.driver}</span>
                        </td>
                        <td class="p-4 text-gray-600 font-medium"><i class="fa-solid fa-car-side mr-1 text-gray-400"></i>${l.vehicle}</td>
                        <td class="p-4 text-right font-bold text-gray-800">₱${l.total.toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
                    </tr>
                `).join('');
            }
        }

        // Add a new vehicle to MongoDB
        document.getElementById('vehicleForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.querySelector('button[type="submit"]');
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Saving...`;
            btn.disabled = true;

            const vehicleData = {
                model: document.getElementById('vModel').value,
                plateNumber: document.getElementById('vPlate').value.toUpperCase(),
                year: document.getElementById('vYear').value,
                fuelType: document.getElementById('vFuel').value,
                efficiency: parseFloat(document.getElementById('vEfficiency').value)
            };

            try {
                const res = await fetch('http://localhost:5000/api/vehicles', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(vehicleData)
                });
                if (res.ok) {
                    document.getElementById('vehicleForm').reset();
                    loadDashboardData(); // Refresh all tables & stats
                }
            } catch (err) {
                console.error('Error saving vehicle:', err);
            } finally {
                btn.innerHTML = `Add to Fleet`;
                btn.disabled = false;
            }
        });

        // Delete vehicle from MongoDB
        async function deleteVehicle(id) {
            if (confirm("Are you sure you want to permanently delete this vehicle?")) {
                try {
                    const res = await fetch(`http://localhost:5000/api/vehicles/${id}`, { method: 'DELETE' });
                    if (res.ok) loadDashboardData(); 
                } catch (err) { console.error("Error deleting vehicle:", err); }
            }
        }
    </script>
</body>
</html>
