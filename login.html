<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - iACADEMY RFID</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: { 
                    colors: { brand: { blue: '#3674FF', blueHover: '#1349CC', bg: '#f4f5f7' } }
                }
            }
        }
    </script>
</head>
<body class="bg-brand-bg font-sans min-h-screen flex items-center justify-center p-6">

    <div class="bg-white w-full max-w-md rounded-2xl shadow-xl overflow-hidden border border-gray-100">
        <div class="p-8 text-center bg-brand-blue text-white">
            <h1 class="text-2xl font-bold">iACADEMY RFID</h1>
            <p class="text-blue-100 text-sm mt-1">Vehicle Management System</p>
        </div>

        <form id="loginForm" class="p-8 space-y-6">
            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Username</label>
                <div class="relative">
                    <i class="fa-solid fa-user absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="text" id="username" required class="w-full border border-gray-200 rounded-lg pl-10 p-3 outline-none focus:border-brand-blue transition-colors">
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Password</label>
                <div class="relative">
                    <i class="fa-solid fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input type="password" id="password" required class="w-full border border-gray-200 rounded-lg pl-10 p-3 outline-none focus:border-brand-blue transition-colors">
                </div>
            </div>

            <div class="flex items-center justify-between">
                <a href="#" class="text-xs text-brand-blue hover:underline">Forgot password?</a>
            </div>

            <button type="submit" class="w-full bg-brand-blue hover:bg-brand-blueHover text-white font-bold py-3 rounded-lg shadow-lg transition-all">
                Sign In
            </button>
            
            <p class="text-center text-xs text-gray-400 mt-4">
                Don't have an account? <a href="signup.html" class="text-brand-blue font-bold">Create Account</a>
            </p>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const submitBtn = document.querySelector('button[type="submit"]');
            
            // Show loading state
            const originalText = submitBtn.innerText;
            submitBtn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Logging in...`;
            submitBtn.disabled = true;

            try {
                // Call the real backend API
                const response = await fetch('http://localhost:5000/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // Success! Store the token and user info in the browser
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('userRole', data.role);
                    if (data.department) localStorage.setItem('userDept', data.department);

                    // Redirect based on role
                    if (data.role === 'admin') {
                        window.location.href = 'dashboard.html';
                    } else {
                        window.location.href = 'driver-dashboard.html';
                    }
                } else {
                    // Fail: Show error message
                    alert(data.message || 'Login failed. Please check your credentials.');
                    submitBtn.innerHTML = originalText;
                    submitBtn.disabled = false;
                }
            } catch (error) {
                console.error('Login error:', error);
                alert('Server error. Make sure your Node.js backend is running!');
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
