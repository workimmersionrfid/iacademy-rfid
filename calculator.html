<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuel Calculator - iACADEMY RFID</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: { 
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { brand: { blue: '#3674FF', blueHover: '#1349CC', bg: '#f4f5f7', border: '#e5e7eb' } }
                }
            }
        }
    </script>
    <style>
        select {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%23666666' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 0.75rem center;
            background-repeat: no-repeat;
            background-size: 1em 1em;
        }
    </style>
</head>
<body class="bg-brand-bg font-sans min-h-screen text-gray-800 antialiased flex flex-col">

    <div id="shared-nav"></div>

    <main class="flex-1 max-w-[1000px] w-full mx-auto px-6 py-8">
        
        <div class="mb-8">
            <h1 class="text-2xl font-bold text-gray-800">Fuel & Distance Calculator</h1>
            <p class="text-sm text-gray-500 mt-1">Quick utility to estimate travel costs using your fleet's actual efficiency data.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            
            <div class="bg-white rounded-xl shadow-sm border border-brand-border p-6 h-fit">
                <h3 class="font-bold text-lg mb-6 flex items-center text-[#3a3a3a]"><i class="fa-solid fa-route text-brand-blue mr-2"></i> Trip Cost Estimator</h3>
                
                <div class="space-y-5">
                    <div>
                        <label class="block text-xs font-semibold text-brand-gray mb-1.5 uppercase tracking-wider">Select Vehicle</label>
                        <select id="calc1Vehicle" onchange="calcTripCost()" class="w-full bg-gray-50 border border-brand-border text-[#3a3a3a] text-sm rounded-lg p-3 outline-none focus:border-brand-blue appearance-none">
                            <option value="14" disabled selected>Loading fleet...</option>
                        </select>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-semibold text-brand-gray mb-1.5 uppercase tracking-wider">Distance (km)</label>
                            <input type="number" id="calc1Distance" value="50" oninput="calcTripCost()" class="w-full bg-white border border-brand-border text-[#3a3a3a] text-sm rounded-lg p-3 outline-none focus:border-brand-blue">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-brand-gray mb-1.5 uppercase tracking-wider">Fuel Price (₱/L)</label>
                            <input type="number" id="calc1Price" value="65" oninput="calcTripCost()" class="w-full bg-white border border-brand-border text-[#3a3a3a] text-sm rounded-lg p-3 outline-none focus:border-brand-blue">
                        </div>
                    </div>

                    <div class="mt-6 pt-6 border-t border-brand-border space-y-3">
                        <div class="flex justify-between items-center">
                            <span class="text-sm text-brand-gray font-medium">Liters Required:</span>
                            <span id="calc1Liters" class="font-bold text-[#3a3a3a]">0.0 L</span>
                        </div>
                        <div class="flex justify-between items-end">
                            <span class="text-sm text-brand-gray font-medium">Estimated Cost:</span>
                            <span id="calc1Total" class="text-3xl font-black text-brand-blue">₱0.00</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-brand-border p-6 h-fit">
                <h3 class="font-bold text-lg mb-6 flex items-center text-[#3a3a3a]"><i class="fa-solid fa-wallet text-green-500 mr-2"></i> Budget to Distance</h3>
                
                <div class="space-y-5">
                    <div>
                        <label class="block text-xs font-semibold text-brand-gray mb-1.5 uppercase tracking-wider">Select Vehicle</label>
                        <select id="calc2Vehicle" onchange="calcDistance()" class="w-full bg-gray-50 border border-brand-border text-[#3a3a3a] text-sm rounded-lg p-3 outline-none focus:border-brand-blue appearance-none">
                            <option value="14" disabled selected>Loading fleet...</option>
                        </select>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-semibold text-brand-gray mb-1.5 uppercase tracking-wider">Budget (₱)</label>
                            <input type="number" id="calc2Budget" value="1000" oninput="calcDistance()" class="w-full bg-white border border-brand-border text-[#3a3a3a] text-sm rounded-lg p-3 outline-none focus:border-brand-blue">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-brand-gray mb-1.5 uppercase tracking-wider">Fuel Price (₱/L)</label>
                            <input type="number" id="calc2Price" value="65" oninput="calcDistance()" class="w-full bg-white border border-brand-border text-[#3a3a3a] text-sm rounded-lg p-3 outline-none focus:border-brand-blue">
                        </div>
                    </div>

                    <div class="mt-6 pt-6 border-t border-brand-border space-y-3">
                        <div class="flex justify-between items-center">
                            <span class="text-sm text-brand-gray font-medium">Fuel Afforded:</span>
                            <span id="calc2Liters" class="font-bold text-[#3a3a3a]">0.0 L</span>
                        </div>
                        <div class="flex justify-between items-end">
                            <span class="text-sm text-brand-gray font-medium">Max Distance:</span>
                            <span id="calc2Total" class="text-3xl font-black text-green-500">0 km</span>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            renderNavigation('calculator');
            loadFleetData();
        });

        async function loadFleetData() {
            const select1 = document.getElementById('calc1Vehicle');
            const select2 = document.getElementById('calc2Vehicle');
            
            try {
                const vehicles = await getVehicles();
                
                if(vehicles.length === 0) {
                    const fallback = '<option value="14" disabled>No vehicles found (Using 14km/L)</option>';
                    select1.innerHTML = fallback;
                    select2.innerHTML = fallback;
                } else {
                    let optionsHTML = '';
                    vehicles.forEach(v => {
                        optionsHTML += `<option value="${v.efficiency}">${v.plateNumber} - ${v.model} (${v.efficiency} km/L)</option>`;
                    });
                    select1.innerHTML = optionsHTML;
                    select2.innerHTML = optionsHTML;
                }
            } catch (err) {
                console.error("Error loading vehicles", err);
            }

            // Run initial calculations
            calcTripCost();
            calcDistance();
        }

        function calcTripCost() {
            const efficiency = parseFloat(document.getElementById('calc1Vehicle').value) || 14;
            const distance = parseFloat(document.getElementById('calc1Distance').value) || 0;
            const price = parseFloat(document.getElementById('calc1Price').value) || 0;

            const liters = distance / efficiency;
            const totalCost = liters * price;

            document.getElementById('calc1Liters').innerText = `${liters.toFixed(1)} L`;
            document.getElementById('calc1Total').innerText = `₱${totalCost.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
        }

        function calcDistance() {
            const efficiency = parseFloat(document.getElementById('calc2Vehicle').value) || 14;
            const budget = parseFloat(document.getElementById('calc2Budget').value) || 0;
            const price = parseFloat(document.getElementById('calc2Price').value) || 0;

            let liters = 0;
            let maxDistance = 0;

            if (price > 0) {
                liters = budget / price;
                maxDistance = liters * efficiency;
            }

            document.getElementById('calc2Liters').innerText = `${liters.toFixed(1)} L`;
            document.getElementById('calc2Total').innerText = `${maxDistance.toFixed(1)} km`;
        }
    </script>
</body>
</html>
