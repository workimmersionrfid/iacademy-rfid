<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator - iACADEMY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: { 
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { brand: { blue: '#3674FF', blueHover: '#1349CC', lightBlue: '#EBF2FF', bg: '#f4f5f7', text: '#333333', gray: '#666666', border: '#e5e7eb' } }
                }
            }
        }
    </script>
    <style>
        select {
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%23666666' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 0.75rem center;
            background-repeat: no-repeat;
            background-size: 1em 1em;
        }
    </style>
</head>
<body class="bg-brand-bg text-brand-text font-sans antialiased min-h-screen flex flex-col">
    
    <div id="shared-nav"></div>
    
    <main class="flex-1 max-w-3xl w-full mx-auto px-6 py-12">
        <h2 class="text-2xl font-medium text-[#3a3a3a] mb-6">Cost Calculator</h2>
        
        <div class="bg-white rounded-xl shadow-sm border border-brand-border p-6 sm:p-8">
            
            <div class="space-y-6">
                <div>
                    <label class="block text-xs font-semibold text-brand-gray mb-2 uppercase tracking-wider">Vehicle</label>
                    <select id="calcVehicle" onchange="updateVehicleSpecs(); calculateCost();" class="w-full bg-white border border-brand-border text-[#3a3a3a] text-sm rounded-lg p-3.5 outline-none focus:border-brand-blue transition-colors appearance-none shadow-sm">
                        <option value="14" data-tank="42">Toyota Vios (2026) - 14 km/L</option>
                        <option value="10" data-tank="80">Toyota Fortuner - 10 km/L</option>
                        <option value="50" data-tank="4">Honda Beat - 50 km/L</option>
                    </select>
                    <div class="flex items-center gap-2 mt-2 ml-1">
                        <span id="vehicleEfficiency" class="text-xs text-brand-gray">14 km/L</span>
                        <span class="bg-[#e5e7eb] text-[#333333] px-1.5 py-0.5 rounded text-[10px]">Preset</span>
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-xs font-semibold text-brand-gray mb-2 uppercase tracking-wider">Distance (KM)</label>
                        <input type="number" id="calcDistance" value="0" oninput="calculateCost()" class="w-full bg-white border border-brand-border text-[#3a3a3a] text-sm rounded-lg p-3.5 outline-none focus:border-brand-blue transition-colors shadow-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-brand-gray mb-2 uppercase tracking-wider">Price per liter (₱)</label>
                        <input type="number" id="calcPrice" value="130" oninput="calculateCost()" class="w-full bg-white border border-brand-border text-[#3a3a3a] text-sm rounded-lg p-3.5 outline-none focus:border-brand-blue transition-colors shadow-sm">
                    </div>
                </div>

                <div class="w-full sm:w-1/2 sm:pr-3">
                    <label class="block text-xs font-semibold text-brand-gray mb-2 uppercase tracking-wider">Trips per week <span class="normal-case font-normal">(optional)</span></label>
                    <input type="number" id="calcTrips" value="0" oninput="calculateCost()" class="w-full bg-white border border-brand-border text-[#3a3a3a] text-sm rounded-lg p-3.5 outline-none focus:border-brand-blue transition-colors shadow-sm">
                </div>
            </div>

            <hr class="border-brand-border my-8">

            <div id="emptyState" class="text-center py-4">
                <p class="text-brand-gray text-sm">Enter a distance and fuel price to see your trip cost.</p>
            </div>

            <div id="resultsSection" class="hidden space-y-6 animate-[fadeIn_0.3s_ease-in-out]">
                
                <div class="grid grid-cols-2 gap-4 sm:gap-6">
                    <div class="bg-[#f8f9fa] border border-brand-border rounded-xl p-4 sm:p-5">
                        <div class="text-xs text-brand-gray uppercase tracking-wider font-semibold mb-1">Liters Needed</div>
                        <div id="resLiters" class="text-2xl font-medium text-[#3a3a3a]">0.00L</div>
                    </div>
                    
                    <div class="bg-[#f8f9fa] border border-brand-border rounded-xl p-4 sm:p-5">
                        <div class="text-xs text-brand-gray uppercase tracking-wider font-semibold mb-1">Trip Cost</div>
                        <div id="resTripCost" class="text-2xl font-medium text-[#3a3a3a]">₱0.00</div>
                    </div>
                    
                    <div class="bg-[#f8f9fa] border border-brand-border rounded-xl p-4 sm:p-5">
                        <div class="text-xs text-brand-gray uppercase tracking-wider font-semibold mb-1">Cost per KM</div>
                        <div id="resCostPerKm" class="text-2xl font-medium text-[#3a3a3a]">₱0.00</div>
                    </div>
                    
                    <div class="bg-[#f8f9fa] border border-brand-border rounded-xl p-4 sm:p-5">
                        <div class="text-xs text-brand-gray uppercase tracking-wider font-semibold mb-1">Full Tank Cost</div>
                        <div id="resFullTank" class="text-2xl font-medium text-[#3a3a3a]">₱0.00</div>
                    </div>
                </div>

                <div id="monthlySection" class="hidden bg-brand-lightBlue border border-[#cce0ff] rounded-xl p-5 flex items-center justify-between">
                    <div id="monthlyLabel" class="text-sm font-medium text-brand-blue">Monthly Estimate (1+ trips/week)</div>
                    <div id="resMonthly" class="text-2xl font-bold text-brand-blue">₱0.00</div>
                </div>

            </div>

            <div class="mt-8 text-center">
                <a href="travel-map.html" class="inline-flex items-center justify-center gap-2 text-sm text-brand-blue hover:text-brand-blueHover font-medium transition-colors">
                    <div class="w-4 h-4 bg-brand-blue rounded-sm flex items-center justify-center"></div>
                    Use a route distance instead
                </a>
            </div>

        </div>
    </main>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            renderNavigation('calculator');
            updateVehicleSpecs();
        });

        // Updates the little text beneath the dropdown when a new vehicle is selected
        function updateVehicleSpecs() {
            const select = document.getElementById('calcVehicle');
            const kmpl = select.value;
            document.getElementById('vehicleEfficiency').innerText = `${kmpl} km/L`;
        }

        // The core math function for the calculator
        function calculateCost() {
            // Get inputs
            const select = document.getElementById('calcVehicle');
            const kmpl = parseFloat(select.value) || 14;
            const tankCapacity = parseFloat(select.options[select.selectedIndex].getAttribute('data-tank')) || 42;
            
            const distance = parseFloat(document.getElementById('calcDistance').value) || 0;
            const price = parseFloat(document.getElementById('calcPrice').value) || 0;
            const trips = parseFloat(document.getElementById('calcTrips').value) || 0;

            const emptyState = document.getElementById('emptyState');
            const resultsSection = document.getElementById('resultsSection');
            const monthlySection = document.getElementById('monthlySection');

            // If distance and price are provided, show results
            if (distance > 0 && price > 0) {
                emptyState.classList.add('hidden');
                resultsSection.classList.remove('hidden');

                // Core Calculations (unrounded for accuracy in subsequent steps)
                const rawLiters = distance / kmpl;
                const rawTripCost = rawLiters * price;
                
                const costPerKm = price / kmpl;
                const fullTankCost = tankCapacity * price;

                // Update UI (formatting to 2 decimal places)
                document.getElementById('resLiters').innerText = `${rawLiters.toFixed(2)}L`;
                document.getElementById('resTripCost').innerText = `₱${rawTripCost.toFixed(2)}`;
                document.getElementById('resCostPerKm').innerText = `₱${costPerKm.toFixed(2)}`;
                
                // Add commas for thousands in full tank
                document.getElementById('resFullTank').innerText = `₱${fullTankCost.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;

                // Monthly Estimate Logic (4 weeks per month assumption based on the video)
                if (trips > 0) {
                    monthlySection.classList.remove('hidden');
                    monthlySection.classList.add('flex');
                    const monthlyCost = rawTripCost * trips * 4;
                    document.getElementById('monthlyLabel').innerText = `Monthly Estimate (${trips}+ trips/week)`;
                    document.getElementById('resMonthly').innerText = `₱${monthlyCost.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
                } else {
                    monthlySection.classList.add('hidden');
                    monthlySection.classList.remove('flex');
                }
            } else {
                // Revert to empty state if cleared
                emptyState.classList.remove('hidden');
                resultsSection.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
