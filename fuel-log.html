<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuel Log - iACADEMY RFID</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: { 
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { brand: { blue: '#1e3a8a', blueHover: '#1e40af', bg: '#f8fafc', border: '#e2e8f0' } }
                }
            }
        }
        // Security Check - Allow both admins and drivers to view their logs
        document.addEventListener("DOMContentLoaded", () => {
            const token = localStorage.getItem('token');
            if (!token) window.location.href = 'login.html';
        });
    </script>
</head>
<body class="bg-brand-bg font-sans min-h-screen text-gray-800 antialiased">

    <div id="shared-nav"></div>

    <main class="max-w-[1400px] mx-auto px-6 py-8 space-y-8">
        
        <div class="bg-gradient-to-r from-blue-800 via-blue-400 to-blue-50 rounded-2xl shadow-md p-8 md:p-12 relative overflow-hidden flex items-center justify-between">
            <div class="relative z-10">
                <p class="text-blue-100 text-sm font-medium mb-1 tracking-wide uppercase">Fleet Management</p>
                <h1 class="text-3xl md:text-4xl font-bold text-white tracking-tight">Mileage & Fuel Records</h1>
                <p class="text-blue-50 mt-2 max-w-lg text-sm">Monitor fuel consumption, station data, and total fleet expenditure.</p>
            </div>
            <div class="hidden md:block relative z-10 text-white/20">
                <i class="fa-solid fa-gas-pump text-9xl"></i>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white rounded-2xl shadow-md p-6 border border-blue-50 flex items-center gap-5">
                <div class="bg-blue-50 text-blue-600 w-14 h-14 rounded-full flex items-center justify-center text-2xl">
                    <i class="fa-solid fa-receipt"></i>
                </div>
                <div>
                    <p class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">Total Records</p>
                    <h3 id="statTotalLogs" class="text-3xl font-black text-blue-900">0</h3>
                </div>
            </div>
            <div class="bg-white rounded-2xl shadow-md p-6 border border-blue-50 flex items-center gap-5">
                <div class="bg-blue-50 text-blue-600 w-14 h-14 rounded-full flex items-center justify-center text-2xl">
                    <i class="fa-solid fa-droplet"></i>
                </div>
                <div>
                    <p class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">Total Liters Pumped</p>
                    <h3 id="statTotalLiters" class="text-3xl font-black text-blue-900">0 L</h3>
                </div>
            </div>
            <div class="bg-white rounded-2xl shadow-md p-6 border border-blue-50 flex items-center gap-5">
                <div class="bg-blue-50 text-blue-600 w-14 h-14 rounded-full flex items-center justify-center text-2xl">
                    <i class="fa-solid fa-peso-sign"></i>
                </div>
                <div>
                    <p class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">Total Expenditure</p>
                    <h3 id="statTotalCost" class="text-3xl font-black text-blue-900">₱0.00</h3>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-md border border-blue-50 overflow-hidden relative">
            <div class="absolute top-0 left-0 w-1 h-full bg-blue-800"></div>
            
            <div class="p-6 border-b border-gray-100 flex flex-col md:flex-row justify-between items-center gap-4">
                <h2 class="font-bold text-xl text-blue-900">Detailed Fuel Log</h2>
                <div class="flex gap-3">
                    <button onclick="window.print()" class="bg-blue-50 hover:bg-blue-100 text-blue-800 px-5 py-2.5 rounded-xl font-bold text-sm transition-colors flex items-center gap-2 border border-blue-100">
                        <i class="fa-solid fa-print"></i> Print Report
                    </button>
                    <button onclick="loadFuelLogs()" class="bg-blue-700 hover:bg-blue-800 text-white px-5 py-2.5 rounded-xl font-bold text-sm shadow-sm transition-colors flex items-center gap-2">
                        <i class="fa-solid fa-rotate-right"></i> Refresh
                    </button>
                </div>
            </div>

            <div class="overflow-x-auto max-h-[600px] overflow-y-auto custom-scrollbar p-2">
                <table class="w-full text-left border-collapse min-w-[800px]">
                    <thead class="sticky top-0 bg-white z-10 shadow-sm">
                        <tr class="border-b border-gray-100 text-xs text-gray-400 uppercase tracking-widest">
                            <th class="p-4 font-bold">Date & Time</th>
                            <th class="p-4 font-bold">Vehicle</th>
                            <th class="p-4 font-bold">Driver / Dept</th>
                            <th class="p-4 font-bold">Gas Station</th>
                            <th class="p-4 font-bold text-right">Volume</th>
                            <th class="p-4 font-bold text-right">Total Cost</th>
                        </tr>
                    </thead>
                    <tbody id="fuelLogsTable" class="text-sm divide-y divide-gray-50">
                        <tr><td colspan="6" class="p-12 text-center text-blue-400"><i class="fa-solid fa-spinner fa-spin text-3xl mb-4"></i><br>Loading records...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </main>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            if (typeof renderNavigation === 'function') {
                renderNavigation('fuel-log');
            }
            loadFuelLogs();
        });

        async function loadFuelLogs() {
            const tableBody = document.getElementById('fuelLogsTable');
            const currentUser = localStorage.getItem('username');
            const userRole = localStorage.getItem('userRole');

            try {
                // Fetch logs from your existing data.js function
                const allLogs = await getLogs();
                
                // If it's a driver, only show THEIR logs. If Admin, show ALL logs.
                const logsToDisplay = userRole === 'admin' ? allLogs : allLogs.filter(log => log.driver === currentUser);

                // Update Summary Stats
                document.getElementById('statTotalLogs').innerText = logsToDisplay.length;
                
                let totalLiters = 0;
                let totalCost = 0;

                if (logsToDisplay.length === 0) {
                    tableBody.innerHTML = `<tr><td colspan="6" class="p-12 text-center text-gray-400 text-base font-medium">No fuel logs found.</td></tr>`;
                    document.getElementById('statTotalLiters').innerText = "0 L";
                    document.getElementById('statTotalCost').innerText = "₱0.00";
                    return;
                }

                tableBody.innerHTML = logsToDisplay.map(log => {
                    // Accumulate totals safely
                    const liters = parseFloat(log.liters) || 0;
                    const cost = parseFloat(log.total) || 0;
                    totalLiters += liters;
                    totalCost += cost;

                    return `
                    <tr class="hover:bg-blue-50/30 transition-colors">
                        <td class="p-4">
                            <span class="bg-gray-100 text-gray-600 font-bold px-3 py-1 rounded-md border border-gray-200 tracking-widest text-[10px] uppercase">${log.date}</span>
                        </td>
                        <td class="p-4">
                            <span class="bg-blue-50 text-blue-800 font-bold px-3 py-1.5 rounded-md border border-blue-100 tracking-wider inline-block">${log.vehicle}</span>
                        </td>
                        <td class="p-4">
                            <div class="font-bold text-gray-800">${log.driver}</div>
                            <div class="text-xs text-gray-500 mt-1">${log.department}</div>
                        </td>
                        <td class="p-4 font-medium text-gray-600">
                            <i class="fa-solid fa-location-dot text-blue-300 mr-1.5"></i> ${log.station || 'N/A'}
                        </td>
                        <td class="p-4 text-right">
                            <div class="font-bold text-gray-800">${liters.toFixed(2)} L</div>
                            <div class="text-[10px] text-gray-400 uppercase tracking-wider mt-1">@ ₱${(parseFloat(log.price) || 0).toFixed(2)}/L</div>
                        </td>
                        <td class="p-4 text-right font-black text-blue-900 text-base">
                            ₱${cost.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}
                        </td>
                    </tr>`;
                }).join('');

                // Apply accumulated totals to DOM
                document.getElementById('statTotalLiters').innerText = `${totalLiters.toFixed(2)} L`;
                document.getElementById('statTotalCost').innerText = `₱${totalCost.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;

            } catch (error) {
                console.error("Error loading logs:", error);
                tableBody.innerHTML = `<tr><td colspan="6" class="p-12 text-center text-red-500 font-bold">Failed to load records. Ensure backend is running.</td></tr>`;
            }
        }
    </script>
</body>
</html>
