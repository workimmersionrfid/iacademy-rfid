<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuel Log - iACADEMY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: { 
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { brand: { blue: '#3674FF', blueHover: '#1349CC', lightBlue: '#EBF2FF', bg: '#f4f5f7', text: '#333333', gray: '#666666', border: '#e5e7eb' } }
                }
            }
        }

        // SECURITY CHECK
        document.addEventListener("DOMContentLoaded", () => {
            const token = localStorage.getItem('token');
            if (!token) window.location.href = 'login.html';
        });
    </script>
</head>
<body class="bg-brand-bg text-brand-text font-sans antialiased min-h-screen flex flex-col">

    <div id="shared-nav"></div>

    <main class="flex-1 max-w-[1400px] w-full mx-auto px-6 py-8 relative">
        <header class="flex justify-between items-end mb-8">
            <div>
                <h1 class="text-2xl font-bold text-gray-800">Master Fuel Ledger</h1>
                <p class="text-sm text-gray-500 mt-1">Track every drop of fuel across the entire fleet.</p>
            </div>
            
            <button onclick="openModal('addFuelModal')" class="bg-brand-blue hover:bg-brand-blueHover text-white px-6 py-2.5 rounded font-medium transition-all flex items-center gap-2 shadow-sm">
                <i class="fa-solid fa-plus"></i> Add Manual Log
            </button>
        </header>

        <section class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-transparent hover:border-brand-blue transition-colors">
                <h3 class="text-[14px] text-brand-gray mb-1 font-medium uppercase tracking-wider">Total Spent</h3>
                <div id="pageTotalSpent" class="text-3xl font-light text-[#3a3a3a]">
                    <i class="fa-solid fa-spinner fa-spin text-xl text-gray-300"></i>
                </div>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-transparent hover:border-brand-blue transition-colors">
                <h3 class="text-[14px] text-brand-gray mb-1 font-medium uppercase tracking-wider">Avg Price/L</h3>
                <div id="pageAvgPrice" class="text-3xl font-light text-[#3a3a3a]">-</div>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-transparent hover:border-brand-blue transition-colors">
                <h3 class="text-[14px] text-brand-gray mb-1 font-medium uppercase tracking-wider">Total Liters</h3>
                <div id="pageTotalLiters" class="text-3xl font-light text-[#3a3a3a]">-</div>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-transparent hover:border-brand-blue transition-colors">
                <h3 class="text-[14px] text-brand-gray mb-1 font-medium uppercase tracking-wider">Fill-Ups</h3>
                <div id="pageFillUps" class="text-3xl font-light text-[#3a3a3a]">-</div>
            </div>
        </section>

        <h3 class="text-lg font-medium text-[#3a3a3a] mb-4">Recent Database Entries</h3>
        <section id="fullLogList" class="space-y-4 pb-8">
            <div class="p-8 text-center text-gray-400 bg-white rounded-xl border border-brand-border">
                <i class="fa-solid fa-spinner fa-spin text-2xl mb-3"></i><br>Loading logs from database...
            </div>
        </section>
    </main>

    <div id="addFuelModal" class="fixed inset-0 bg-gray-900/50 backdrop-blur-sm hidden items-center justify-center z-50">
        <div class="bg-white rounded-xl w-full max-w-lg overflow-hidden scale-95 opacity-0 transition-all duration-200 shadow-xl" id="fuelModalBox">
            <div class="p-5 border-b border-brand-border flex justify-between items-center bg-[#f8f9fa]">
                <h2 class="text-lg font-medium text-[#3a3a3a]">Add Manual Fuel Log</h2>
                <button onclick="closeModal('addFuelModal')" class="text-brand-gray hover:text-brand-blue transition-colors"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <div class="p-6 space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-brand-gray mb-2 uppercase tracking-wider">Vehicle</label>
                    <select id="modalVehicleSelect" class="w-full bg-white border border-brand-border text-[#3a3a3a] text-sm rounded p-3 outline-none focus:border-brand-blue transition-colors appearance-none">
                        <option value="" disabled selected class="text-gray-400">Loading fleet...</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-brand-gray mb-2 uppercase tracking-wider">Date</label>
                        <input type="date" id="fuelDate" class="w-full bg-white border border-brand-border text-[#3a3a3a] text-sm rounded p-3 outline-none focus:border-brand-blue transition-colors">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-brand-gray mb-2 uppercase tracking-wider">Fuel Type</label>
                        <select id="fuelType" class="w-full bg-white border border-brand-border text-[#3a3a3a] text-sm rounded p-3 outline-none focus:border-brand-blue transition-colors appearance-none">
                            <option>Ron91</option>
                            <option>Ron95</option>
                            <option>Ron97</option>
                            <option>Diesel</option>
                        </select>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-brand-gray mb-2 uppercase tracking-wider">Price per liter (₱)</label>
                        <input type="number" id="fuelPrice" value="0" step="0.01" oninput="calculateTotal()" class="w-full bg-white border border-brand-border text-[#3a3a3a] text-sm rounded p-3 outline-none focus:border-brand-blue transition-colors">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-brand-gray mb-2 uppercase tracking-wider">Liters</label>
                        <input type="number" id="fuelLiters" value="0" step="0.01" oninput="calculateTotal()" class="w-full bg-white border border-brand-border text-[#3a3a3a] text-sm rounded p-3 outline-none focus:border-brand-blue transition-colors">
                    </div>
                </div>
                <div class="bg-[#fcfcfc] border border-[#e5e7eb] rounded p-3 flex flex-col items-center justify-center">
                    <span class="text-xs text-brand-gray mb-1">Total Cost</span>
                    <span id="fuelTotalCost" class="text-3xl font-light text-brand-blue">₱0.00</span>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-brand-gray mb-2 uppercase tracking-wider">Odometer (KM) <span class="normal-case font-normal">(optional)</span></label>
                    <input type="number" id="fuelOdo" class="w-full bg-white border border-brand-border text-[#3a3a3a] text-sm rounded p-3 outline-none focus:border-brand-blue transition-colors">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-brand-gray mb-2 uppercase tracking-wider">Station <span class="normal-case font-normal">(optional)</span></label>
                    <input type="text" id="fuelStation" placeholder="Shell, Petron, Caltex..." class="w-full bg-white border border-brand-border text-[#3a3a3a] text-sm rounded p-3 outline-none focus:border-brand-blue transition-colors">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-brand-gray mb-2 uppercase tracking-wider">Notes <span class="normal-case font-normal">(optional)</span></label>
                    <input type="text" id="fuelNotes" class="w-full bg-white border border-brand-border text-[#3a3a3a] text-sm rounded p-3 outline-none focus:border-brand-blue transition-colors">
                </div>
            </div>
            <div class="p-5 border-t border-brand-border bg-[#f8f9fa] flex gap-3">
                <button onclick="closeModal('addFuelModal')" class="flex-1 bg-white border border-brand-border text-[#3a3a3a] hover:bg-gray-100 px-4 py-2.5 rounded font-medium transition-colors">Cancel</button>
                <button id="saveLogBtn" onclick="submitFuelLog()" class="flex-1 bg-brand-blue hover:bg-brand-blueHover text-white px-4 py-2.5 rounded font-medium transition-colors">Save Log</button>
            </div>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            renderNavigation('fuel-log');
            
            // Set today's date in the form
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('fuelDate').value = today;

            // Fetch data from MongoDB
            loadLedgerData();
        });

        function calculateTotal() {
            const price = parseFloat(document.getElementById('fuelPrice').value) || 0;
            const liters = parseFloat(document.getElementById('fuelLiters').value) || 0;
            const total = price * liters;
            document.getElementById('fuelTotalCost').innerText = `₱${total.toFixed(2)}`;
            return total;
        }

        async function loadLedgerData() {
            const logs = await getLogs();
            const vehicles = await getVehicles();

            // 1. Populate Vehicle Dropdown
            const modalSelect = document.getElementById('modalVehicleSelect');
            if (vehicles.length === 0) {
                modalSelect.innerHTML = '<option value="" disabled selected>No vehicles available</option>';
            } else {
                modalSelect.innerHTML = vehicles.map(v => `<option value="${v.plateNumber}">${v.plateNumber} (${v.model})</option>`).join('');
            }

            // 2. Calculate Stats
            let totalSpent = 0;
            let totalLiters = 0;
            
            logs.forEach(log => {
                totalSpent += (log.total || 0);
                totalLiters += (log.liters || 0);
            });

            const avgPrice = totalLiters > 0 ? (totalSpent / totalLiters) : 0;

            document.getElementById('pageTotalSpent').innerText = `₱${totalSpent.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}`;
            document.getElementById('pageTotalLiters').innerText = `${totalLiters.toFixed(1)}L`;
            document.getElementById('pageAvgPrice').innerText = `₱${avgPrice.toFixed(2)}`;
            document.getElementById('pageFillUps').innerText = logs.length;

            // 3. Render Logs List
            const logList = document.getElementById('fullLogList');
            if (logs.length === 0) {
                logList.innerHTML = `<div class="p-8 text-center text-gray-400 bg-white rounded-xl border border-brand-border"><i class="fa-solid fa-folder-open text-2xl mb-2"></i><br>No fuel logs have been submitted yet.</div>`;
                return;
            }

            logList.innerHTML = logs.map(l => {
                let locationString = l.date || 'Unknown Date';
                if (l.station) locationString += ` • ${l.station}`;
                if (l.odo) locationString += ` - ${l.odo} km`;

                let notesHTML = l.notes ? `<div class="text-xs text-brand-gray mt-1 italic">"${l.notes}"</div>` : '';

                return `
                    <div class="flex justify-between items-center p-6 bg-white border border-brand-border rounded-xl shadow-sm hover:border-gray-300 transition-colors">
                        <div>
                            <div class="font-medium text-[#3a3a3a] text-lg mb-1">${l.fuelType || 'Fuel'} <span class="text-brand-gray font-normal text-sm ml-2">${l.vehicle}</span></div>
                            <div class="text-sm text-brand-gray">${locationString}</div>
                            <div class="text-xs text-gray-400 mt-1.5"><i class="fa-regular fa-user mr-1 text-brand-blue"></i> <b>${l.driver}</b> (${l.department})</div>
                            ${notesHTML}
                        </div>
                        <div class="text-right">
                            <div class="font-medium text-[#3a3a3a] text-lg mb-1">₱${l.total.toLocaleString(undefined, {minimumFractionDigits: 2})}</div>
                            <div class="text-sm text-brand-gray mb-2">${l.liters.toFixed(1)}L, ₱${l.price.toFixed(2)}/L</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function submitFuelLog() {
            const btn = document.getElementById('saveLogBtn');
            const vSelect = document.getElementById('modalVehicleSelect');

            if(!vSelect.value) {
                alert("Please select a vehicle.");
                return;
            }

            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin mr-2"></i> Saving...`;
            btn.disabled = true;

            const logData = {
                vehicle: vSelect.value,
                driver: localStorage.getItem('username') || 'System Admin',
                department: localStorage.getItem('userDept') || 'ADMIN',
                date: document.getElementById('fuelDate').value,
                fuelType: document.getElementById('fuelType').value,
                price: parseFloat(document.getElementById('fuelPrice').value) || 0,
                liters: parseFloat(document.getElementById('fuelLiters').value) || 0,
                total: (parseFloat(document.getElementById('fuelPrice').value) || 0) * (parseFloat(document.getElementById('fuelLiters').value) || 0),
                odo: parseInt(document.getElementById('fuelOdo').value) || null,
                station: document.getElementById('fuelStation').value,
                notes: document.getElementById('fuelNotes').value
            };

            try {
                await addLog(logData);
                
                // Reset form
                document.getElementById('fuelPrice').value = '0';
                document.getElementById('fuelLiters').value = '0';
                document.getElementById('fuelTotalCost').innerText = '₱0.00';
                document.getElementById('fuelStation').value = '';
                document.getElementById('fuelOdo').value = '';
                document.getElementById('fuelNotes').value = '';
                
                closeModal('addFuelModal');
                
                // Refresh data from MongoDB to update list and stats
                loadLedgerData(); 
            } catch (err) {
                alert('Failed to save log to database.');
            } finally {
                btn.innerHTML = 'Save Log';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
