<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports & Analytics - iACADEMY RFID</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: { 
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { brand: { blue: '#1e3a8a', blueHover: '#1e40af', bg: '#f8fafc', border: '#e2e8f0' } }
                }
            }
        }
        document.addEventListener("DOMContentLoaded", () => {
            const token = localStorage.getItem('token');
            const role = localStorage.getItem('userRole');
            if (!token || role !== 'admin') window.location.href = 'login.html';
        });
    </script>
</head>
<body class="bg-brand-bg font-sans min-h-screen text-gray-800 antialiased">

    <div id="shared-nav"></div>

    <main class="max-w-[1400px] mx-auto px-6 py-8 space-y-8">
        
        <div class="bg-gradient-to-r from-blue-800 via-blue-400 to-blue-50 rounded-2xl shadow-md p-8 md:p-12 relative overflow-hidden flex items-center justify-between">
            <div class="relative z-10">
                <p class="text-blue-100 text-sm font-medium mb-1 tracking-wide uppercase">Administrator Portal</p>
                <h1 class="text-3xl md:text-4xl font-bold text-white tracking-tight">Reports & Analytics</h1>
                <p class="text-blue-50 mt-2 max-w-lg text-sm">Filter, analyze, and export comprehensive action and handover logs.</p>
            </div>
            <div class="hidden md:block relative z-10 text-white/20">
                <i class="fa-solid fa-chart-pie text-9xl"></i>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-md border border-blue-50 overflow-hidden relative p-8">
            <div class="absolute top-0 left-0 w-1 h-full bg-blue-600"></div>
            
            <h2 class="font-bold text-xl text-blue-900 mb-6 flex items-center gap-2">
                <i class="fa-solid fa-filter text-blue-400"></i> Database Filters
            </h2>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-5 mb-6">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Start Date</label>
                    <input type="date" id="filterStart" class="w-full border border-gray-200 rounded-xl p-3 text-sm outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 text-gray-700">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">End Date</label>
                    <input type="date" id="filterEnd" class="w-full border border-gray-200 rounded-xl p-3 text-sm outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 text-gray-700">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">All Tasks</label>
                    <select id="filterTask" class="w-full border border-gray-200 rounded-xl p-3 text-sm outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 bg-white">
                        <option value="">All Tasks</option>
                        <option value="Asset Collection">Asset Collection</option>
                        <option value="Document Routing">Document Routing</option>
                        <option value="Hardware Transport">Hardware Transport</option>
                        <option value="Bank Transaction">Bank Transaction</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-5 mb-8">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">All Destinations</label>
                    <select id="filterDest" class="w-full border border-gray-200 rounded-xl p-3 text-sm outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 bg-white">
                        <option value="">All Destinations</option>
                        <option value="iACADEMY Nexus">iACADEMY Nexus</option>
                        <option value="iACADEMY Plaza">iACADEMY Plaza</option>
                        <option value="Metrobank">Metrobank</option>
                        <option value="Macquarie">Macquarie</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">All Travel Updates</label>
                    <select id="filterTravel" class="w-full border border-gray-200 rounded-xl p-3 text-sm outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 bg-white">
                        <option value="">All Travel Updates</option>
                        <option value="En Route">En Route</option>
                        <option value="Delayed">Delayed</option>
                        <option value="Nearby">Nearby</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">All Handover Results</label>
                    <select id="filterHandover" class="w-full border border-gray-200 rounded-xl p-3 text-sm outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 bg-white">
                        <option value="">All Handover Results</option>
                        <option value="Completed">Successful</option>
                        <option value="Completed_Remarks">Successful (With Remarks)</option>
                        <option value="Failed">Failed</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 border-b border-gray-100 pb-8">
                <button onclick="applyFilters()" class="w-full bg-blue-700 hover:bg-blue-800 text-white font-bold py-3.5 rounded-xl shadow-md transition-colors flex justify-center items-center gap-2">
                    <i class="fa-solid fa-magnifying-glass"></i> Search Database
                </button>
                <button onclick="clearFilters()" class="w-full bg-gray-500 hover:bg-gray-600 text-white font-bold py-3.5 rounded-xl shadow-md transition-colors flex justify-center items-center gap-2">
                    <i class="fa-solid fa-eraser"></i> Clear
                </button>
            </div>

            <div class="pt-6">
                <button onclick="exportToExcel()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-xl shadow-md transition-colors flex justify-center items-center gap-2 text-sm uppercase tracking-wider">
                    <i class="fa-solid fa-file-excel text-lg"></i> Export Filtered Report To Excel
                </button>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-md border border-blue-50 overflow-hidden relative">
            <div class="absolute top-0 left-0 w-1 h-full bg-blue-400"></div>
            
            <div class="p-6 border-b border-gray-100 flex justify-between items-center">
                <h2 class="font-bold text-xl text-blue-900 flex items-center gap-2">
                    <i class="fa-solid fa-list-check text-blue-400"></i> Filtered Results
                </h2>
                <span id="resultCount" class="bg-blue-50 text-blue-700 font-bold px-3 py-1 rounded-md text-xs border border-blue-100">0 logs found</span>
            </div>

            <div class="overflow-x-auto max-h-[800px] overflow-y-auto custom-scrollbar p-2">
                <table class="w-full text-left border-collapse min-w-[1000px]">
                    <thead class="sticky top-0 bg-white z-10 shadow-sm">
                        <tr class="border-b border-gray-100 text-xs text-gray-400 uppercase tracking-widest">
                            <th class="p-4 font-bold">Timestamp</th>
                            <th class="p-4 font-bold">Driver & Vehicle</th>
                            <th class="p-4 font-bold">Action & Task</th>
                            <th class="p-4 font-bold">Destination</th>
                            <th class="p-4 font-bold">Status & Remarks</th>
                        </tr>
                    </thead>
                    <tbody id="resultsTable" class="text-sm divide-y divide-gray-50">
                        <tr><td colspan="5" class="p-12 text-center text-blue-400"><i class="fa-solid fa-spinner fa-spin text-3xl mb-4"></i><br>Loading database...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </main>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    
    <script>
        const API_BASE = 'https://iacademy-rfid.onrender.com/api';
        let allLogs = [];
        let filteredLogs = [];

        document.addEventListener("DOMContentLoaded", () => {
            if (typeof renderNavigation === 'function') renderNavigation('reports');
            fetchLogs();
        });

        async function fetchLogs() {
            try {
                const res = await fetch(`${API_BASE}/action-logs`);
                allLogs = await res.json();
                filteredLogs = [...allLogs];
                renderTable(filteredLogs);
            } catch (error) {
                console.error("Failed to fetch logs", error);
                document.getElementById('resultsTable').innerHTML = `<tr><td colspan="5" class="p-12 text-center text-red-500 font-bold">Failed to load database.</td></tr>`;
            }
        }

        function applyFilters() {
            const fStart = document.getElementById('filterStart').value;
            const fEnd = document.getElementById('filterEnd').value;
            const fTask = document.getElementById('filterTask').value.toLowerCase();
            const fDest = document.getElementById('filterDest').value.toLowerCase();
            const fTravel = document.getElementById('filterTravel').value.toLowerCase();
            const fHandover = document.getElementById('filterHandover').value; // Keep original casing for exact match

            filteredLogs = allLogs.filter(log => {
                let match = true;
                
                // Date logic
                if (fStart || fEnd) {
                    const logDate = new Date(log.timestamp).toISOString().split('T')[0];
                    if (fStart && logDate < fStart) match = false;
                    if (fEnd && logDate > fEnd) match = false;
                }

                if (fTask && !log.task.toLowerCase().includes(fTask)) match = false;
                if (fDest && !log.location.toLowerCase().includes(fDest)) match = false;
                
                // For "Travel Update" filter, look at delivery_status (which contains En Route, Delayed, etc.)
                if (fTravel && (!log.delivery_status || !log.delivery_status.toLowerCase().includes(fTravel))) match = false;
                
                // For "Handover", look at completion_type
                if (fHandover && log.completion_type !== fHandover) match = false;

                return match;
            });

            renderTable(filteredLogs);
        }

        function clearFilters() {
            document.getElementById('filterStart').value = '';
            document.getElementById('filterEnd').value = '';
            document.getElementById('filterTask').value = '';
            document.getElementById('filterDest').value = '';
            document.getElementById('filterTravel').value = '';
            document.getElementById('filterHandover').value = '';
            
            filteredLogs = [...allLogs];
            renderTable(filteredLogs);
        }

        function renderTable(logs) {
            const tableBody = document.getElementById('resultsTable');
            document.getElementById('resultCount').innerText = `${logs.length} logs found`;

            if (logs.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="5" class="p-12 text-center text-gray-400 text-sm italic">No logs match your search criteria.</td></tr>`;
                return;
            }

            tableBody.innerHTML = logs.map(log => {
                const dateObj = new Date(log.timestamp);
                const dateFormatted = dateObj.toISOString().split('T')[0];
                const timeFormatted = dateObj.toTimeString().split(' ')[0];

                let statusBadge = `<span class="text-gray-500">${log.delivery_status}</span>`;
                if(log.action === "Final Task Handover") {
                    if(log.completion_type === "Completed" || log.completion_type === "Completed_Remarks") 
                        statusBadge = `<span class="text-emerald-700 bg-emerald-50 px-2 py-1 rounded border border-emerald-200 font-bold text-[10px] uppercase">${log.delivery_status}</span>`;
                    else if(log.completion_type === "Failed")
                        statusBadge = `<span class="text-red-700 bg-red-50 px-2 py-1 rounded border border-red-200 font-bold text-[10px] uppercase">${log.delivery_status}</span>`;
                } else if(log.action === "Travel Update") {
                    statusBadge = `<span class="text-blue-700 bg-blue-50 px-2 py-1 rounded border border-blue-200 font-bold text-[10px] uppercase"><i class="fa-solid fa-route mr-1"></i> ${log.delivery_status}</span>`;
                }

                let comments = log.comments !== "None" ? `<div class="text-[10px] text-gray-400 mt-1 italic">"${log.comments}"</div>` : '';
                let incompleteReasons = (log.incomplete_reasons && log.incomplete_reasons !== "None") ? `<div class="text-[10px] text-red-500 font-semibold mt-1">Reason: ${log.incomplete_reasons}</div>` : '';

                return `
                <tr class="hover:bg-blue-50/30 transition-colors">
                    <td class="p-4">
                        <div class="font-bold text-gray-800">${dateFormatted}</div>
                        <div class="text-xs text-gray-500 mt-0.5"><i class="fa-regular fa-clock mr-1"></i> ${timeFormatted}</div>
                    </td>
                    <td class="p-4">
                        <div class="font-bold text-gray-800"><i class="fa-regular fa-user text-blue-400 mr-1"></i> ${log.driver_name}</div>
                        <div class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mt-1">Plate: ${log.plate_number}</div>
                    </td>
                    <td class="p-4">
                        <div class="font-bold text-blue-900">${log.action}</div>
                        <div class="text-xs text-gray-500 mt-1">${log.task}</div>
                    </td>
                    <td class="p-4 font-medium text-gray-600 text-sm">
                        ${log.location}
                    </td>
                    <td class="p-4">
                        ${statusBadge}
                        ${incompleteReasons}
                        ${comments}
                    </td>
                </tr>`;
            }).join('');
        }

        function exportToExcel() {
            if (filteredLogs.length === 0) {
                alert("No data to export!");
                return;
            }

            // Map internal JSON keys to nice Excel headers
            const exportData = filteredLogs.map(log => ({
                "Date": new Date(log.timestamp).toLocaleDateString(),
                "Time": new Date(log.timestamp).toLocaleTimeString(),
                "Driver Name": log.driver_name,
                "Plate Number": log.plate_number,
                "Action Type": log.action,
                "Task": log.task,
                "Destination": log.location,
                "Status": log.delivery_status,
                "Result Type": log.completion_type || "N/A",
                "Remarks/Reasons": log.incomplete_reasons !== "None" ? log.incomplete_reasons : "",
                "Comments": log.comments !== "None" ? log.comments : "",
                "GPS Latitude": log.latitude,
                "GPS Longitude": log.longitude
            }));

            // Generate Worksheet
            const worksheet = XLSX.utils.json_to_sheet(exportData);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Filtered Logs");

            // Save File
            const fileName = `Logistics_Report_${new Date().toISOString().split('T')[0]}.xlsx`;
            XLSX.writeFile(workbook, fileName);
        }
    </script>
</body>
</html>
